<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股觀察站｜股票學習</title>
  <link rel="stylesheet" href="./assets/style.css?v=20260323e" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar card page-hero">
      <div>
        <p class="eyebrow">LEARNING LAB</p>
        <h1>股票學習</h1>
        <p class="hero-copy">這頁不是拿來堆名詞，而是把每天值得學的東西整理成你看得懂、之後也用得上的版本。重點不是背知識，而是慢慢建立自己的判斷框架。</p>
      </div>
      <div class="hero-meta compact-meta">
        <div>
          <span class="label">最新整理日</span>
          <strong id="learningDateLabel">--</strong>
        </div>
        <div>
          <span class="label">頁面用途</span>
          <strong>把觀念變成判斷工具</strong>
        </div>
      </div>
    </header>

    <nav class="site-nav card" id="siteNav"></nav>

    <main>
      <section class="summary-grid">
        <article class="card highlight">
          <span class="label">今天先學這件事</span>
          <h2 id="learningHeadline">載入中...</h2>
          <p id="learningSummary" class="hero-copy">正在整理今天的學習重點。</p>
          <div class="chips" id="learningTags"></div>
        </article>
        <article class="card stat-list" id="learningStats"></article>
      </section>

      <section class="grid-two">
        <article class="card">
          <div class="section-head"><h3>今天學這些是為了什麼</h3></div>
          <div id="learningPurpose" class="comparison-panel"></div>
        </article>
        <article class="card">
          <div class="section-head"><h3>你可以怎麼把它拿來用</h3></div>
          <div id="learningUse" class="comparison-panel"></div>
        </article>
      </section>

      <section id="learningModules" class="stack-layout"></section>
    </main>
  </div>

  <script src="./assets/site.js?v=20260324f"></script>
  <script>
    const LEARNING_DATA = {
      date: '2026-03-23',
      headline: '今晚主要是在鞏固：分批進場不是切幾筆，而是每一筆理由還在不在',
      summary: '今天不算學到很花俏的新招，更多是在收盤驗證後把幾個基本觀念釘得更牢：跌深收斂不等於安全、急拉不等於能追、ETF 也要先分清楚用途。這些看起來很基本，但剛好就是新手最容易因為情緒而做錯的地方。',
      tags: ['今晚學到什麼', '分批進場', 'ETF用途'],
      modules: [
        {
          title: '分批進場真正的重點，不是切幾筆，而是每一筆理由還在不在',
          summary: '今天最大的學習不是「跌很多可以分批」，而是你要先確認第一筆買進理由有沒有成立，再決定第二筆要不要進。市場沒一起穩時，分批也可能只是分批接刀。',
          whyItMatters: '很多人以為有分批就等於風險比較小，但如果每一筆都是在同一個錯誤前提下買進，只是把錯誤切成三次。',
          howToUse: '之後每補一筆前，先問自己：權值、ETF、族群有沒有一起比剛剛更穩？如果沒有，那就寧可慢一點。',
          takeaways: [
            '分批是風險控制，不是讓自己比較敢亂買。',
            '每補一筆前，都要先確認原本進場理由還活著。'
          ]
        },
        {
          title: '什麼情況別追高？急跌後急拉、但只有情緒沒有結構時最危險',
          summary: '今天這種盤最容易讓人看到某幾檔突然拉起來就以為反轉開始，但如果量價、族群、權值沒有一起跟上，那多半只是情緒反彈，不是安全訊號。',
          whyItMatters: '新手最常虧的不是買在完全沒人要的地方，而是買在看起來很像要轉強、其實只是短暫激動的地方。',
          howToUse: '以後看到急跌後急拉，先看是不是只有少數熱門股在衝。如果整體沒跟上，就先把手收回來。',
          takeaways: [
            '少數強，不等於整體轉強。',
            '你看不懂它為什麼漲，就先不要因為怕錯過去追。'
          ]
        },
        {
          title: 'ETF 怎麼看才比較不容易踩坑？先分清楚它是工具還是結論',
          summary: '高股息 ETF 在震盪盤比較像防守工具，大盤型 ETF 比較像觀察工具。它們都不是「因為今天跌比較少，所以明天一定最好」的結論。',
          whyItMatters: '如果把 ETF 直接當成答案，你很容易忽略它背後其實也只是市場的一種反應。先知道自己是拿它來防守還是拿它來觀察，判斷會穩很多。',
          howToUse: '下次看盤時，先把高股息 ETF 當成承接與防守的參考，把大盤型 ETF 當成權值止穩的風向球，再決定要不要進一步動作。',
          takeaways: [
            '高股息 ETF 適合幫你放慢節奏，不代表完全沒有風險。',
            '大盤型 ETF 止跌時，可以先當風向球，不急著一看到收斂就重押。'
          ]
        }
      ]
    };

    function renderLearningPage() {
      renderSiteNav('股票學習');
      document.getElementById('learningDateLabel').textContent = LEARNING_DATA.date;
      setPageUpdateLabel('learningUpdatedAt', formatUpdateLabel(LEARNING_DATA.date, '20:42'));
      document.getElementById('learningHeadline').textContent = LEARNING_DATA.headline;
      document.getElementById('learningSummary').textContent = LEARNING_DATA.summary;
      document.getElementById('learningTags').innerHTML = LEARNING_DATA.tags.map(tag => `<span class="chip">${tag}</span>`).join('');

      document.getElementById('learningStats').innerHTML = [
        ['今天主題', '先分辨觀察與進場'],
        ['學習模組', `${LEARNING_DATA.modules.length} 個`],
        ['核心方向', '建立判斷框架'],
        ['用途', '拿去看盤與下單前思考']
      ].map(([label, value]) => `
        <div class="stat">
          <span class="label">${label}</span>
          <span class="value">${value}</span>
        </div>
      `).join('');

      document.getElementById('learningPurpose').innerHTML = [
        '<div class="compare-item"><strong>不是背知識，是降低亂做單</strong><br>這頁整理的不是考試題，而是你在真實市場裡最容易做錯判斷的地方。</div>',
        '<div class="compare-item"><strong>不是看爽，是幫你慢慢形成框架</strong><br>你之後看市場時，不會只看漲跌，而會開始看量、承接、族群、風險位置。</div>'
      ].join('');

      document.getElementById('learningUse').innerHTML = [
        '<div class="compare-item"><strong>怎麼用在今天</strong><br>今天這種大震盪盤，就用這頁提醒自己：跌深收斂不等於可以直接衝，先看市場是不是整體一起穩。</div>',
        '<div class="compare-item"><strong>怎麼用在之後</strong><br>之後每次想買前，你都可以回來問：我現在看到的是觀察訊號，還是真的進場訊號？</div>'
      ].join('');

      document.getElementById('learningModules').innerHTML = LEARNING_DATA.modules.map(item => `
        <article class="card report-card">
          <span class="label">股票學習模組</span>
          <h3>${item.title}</h3>
          <p class="report-summary">${item.summary}</p>
          <div class="comparison-panel" style="margin-bottom:12px;">
            <div class="compare-item"><strong>為什麼這件事重要</strong><br>${item.whyItMatters}</div>
            <div class="compare-item"><strong>你可以怎麼把它拿來用</strong><br>${item.howToUse}</div>
          </div>
          <ul class="help-list report-list">
            ${item.takeaways.map(point => `<li>${point}</li>`).join('')}
          </ul>
        </article>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', renderLearningPage);
  </script>
</body>
</html>
ngPage);
  </script>
</body>
</html>
