<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股觀察站｜首頁總覽</title>
  <link rel="stylesheet" href="./assets/style.css?v=20260323e" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar card">
      <div>
        <p class="eyebrow">MI CHONG STOCK HUB</p>
        <h1>台股觀察站</h1>
        <p class="hero-copy">這裡先給你一眼看懂整站重點：今天市場大概怎麼看、現在各分頁是拿來做什麼、你今天適合先去哪一頁。首頁不是只放骨架，而是變成你每天進站先看的入口。</p>
      </div>
      <div class="hero-meta compact-meta">
        <div>
          <span class="label">最新整理日</span>
          <strong data-latest-date>--</strong>
        </div>
        <div>
          <span class="label">目前定位</span>
          <strong>每日入口頁</strong>
        </div>
      </div>
    </header>

    <nav class="site-nav card" id="siteNav"></nav>

    <main>
      <section class="summary-grid">
        <article class="card highlight">
          <span class="label">今天一句話</span>
          <h2 id="homeHeadline">載入中...</h2>
          <p id="homeSummary" class="hero-copy">正在整理首頁總覽內容。</p>
          <div class="chips" id="homeTags"></div>
        </article>

        <article class="card stat-list" id="homeStats"></article>
      </section>

      <section class="grid-two">
        <article class="card">
          <div class="section-head">
            <h3>今天建議怎麼看這個站</h3>
          </div>
          <div class="comparison-panel" id="homeGuide"></div>
        </article>

        <article class="card">
          <div class="section-head">
            <h3>今天市場焦點</h3>
          </div>
          <div class="comparison-panel" id="marketFocusPreview"></div>
        </article>
      </section>

      <section class="grid-two">
        <article class="card">
          <div class="section-head">
            <h3>蝦米蟲的判斷反省</h3>
          </div>
          <div class="comparison-panel" id="assistantReflection"></div>
        </article>

        <article class="card">
          <div class="section-head">
            <h3>下次我會怎麼修正</h3>
          </div>
          <div class="comparison-panel" id="assistantAdjustment"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="./assets/site.js?v=20260324f"></script>
  <script>
    const ASSISTANT_REFLECTION = {
      review: [
        '今天午間最該承認的，不是哪一檔最會噴，而是早盤「震盪偏防守」的定調已經被盤面正式推翻。',
        '台積電、聯電、鴻海、聯發科與高股息 ETF 同步走強，代表這不是單點護盤，而是權值領軍、電子擴散的強彈盤。',
        '真正有價值的修正，不是把所有標的都改成偏多，而是把 ETF、個股、避開名單與午後零股策略一起換成同一個午間版本。',
        '今天午間仍要保留的警覺，是單日急漲超過 3% 後，午後與隔日更容易發生高檔震盪與追價失敗。'
      ],
      adjustment: [
        '下午先看 006208、0050 能不能守住大半漲幅，再看 2330、2303、2317 是否維持強勢結構。',
        '高股息 ETF 的角色已從主防守工具改成穩健參與與零股替代，所以不再拿它們當今天主線本身。',
        '只要午後權值量能轉弱、台積電回吐、ETF 漲幅快速收斂，我就會在收盤前再把午間樂觀修正重新檢查一次。'
      ]
    };

    function renderHomeOverview() {
      renderSiteNav('首頁總覽');
      const latest = REPORT_LIBRARY.dailyBriefs[0];
      const market = REPORT_LIBRARY.marketFocus;

      document.getElementById('homeHeadline').textContent = latest.title;
      document.getElementById('homeSummary').textContent = latest.summary;
      document.getElementById('homeTags').innerHTML = latest.tags.map(tag => `<span class="chip">${tag}</span>`).join('');

      document.getElementById('homeStats').innerHTML = [
        ['建議起手頁', '首頁 → 今日股市'],
        ['今天節奏', '午間修正 / 強彈續航檢查'],
        ['操作方向', '保留多方 / 但不追情緒'], 
        ['目前站點', '5 個分頁']
      ].map(([label, value]) => `
        <div class="stat">
          <span class="label">${label}</span>
          <span class="value">${value}</span>
        </div>
      `).join('');

      document.getElementById('homeGuide').innerHTML = [
        ['先看今日股市', '如果你現在只想知道今天能不能動、該先觀察什麼，就先去「今日股市」。'],
        ['再看日報中心', '如果你想回頭看今天晨間 / 午間 / 晚間是怎麼一步步整理的，就去「日報中心」。'],
        ['需要補觀念時看股票學習', '如果你想補分批、ETF、避追高這類基礎判斷，再去「股票學習」。'],
        ['有實際下單就看交易紀錄', '如果你要記錄買賣、回頭核對理由，最後再去「交易紀錄」。']
      ].map(([title, desc]) => `<div class="compare-item"><strong>${title}</strong><br>${desc}</div>`).join('');

      document.getElementById('marketFocusPreview').innerHTML = market.checklist
        .map(item => `<div class="compare-item"><strong>${item.title}</strong><br>${item.detail}</div>`)
        .join('');


      document.getElementById('assistantReflection').innerHTML = ASSISTANT_REFLECTION.review
        .map(text => `<div class="compare-item">${text}</div>`)
        .join('');

      document.getElementById('assistantAdjustment').innerHTML = ASSISTANT_REFLECTION.adjustment
        .map(text => `<div class="compare-item">${text}</div>`)
        .join('');
    }

    document.addEventListener('DOMContentLoaded', renderHomeOverview);
  </script>
</body>
</html>
